<script>
async function generate() {
  const btn = document.getElementById("generateBtn");
  const resultEl = document.getElementById("result");
  const logEl = document.getElementById("agentLog");

  btn.disabled = true;
  btn.innerText = "Agent 실행 중...";

  logEl.style.display = "block";
  logEl.innerHTML = `
    <div>[Pi] Master Agent initialized</div>
    <div>[Skill] parse-intent skill loaded</div>
    <div>[MCP] recipe-mcp ready</div>
    <div>[MCP] fridge-inventory-mcp ready</div>
    <div>[MCP] price-comparison-mcp ready</div>
  `;

  const allergyText = document.getElementById("allergies").value.trim();

  const payload = {
    family_size: parseInt(document.getElementById("family_size").value),
    allergies: allergyText ? allergyText.split(",").map(x => x.trim()) : [],
    purpose: document.getElementById("purpose").value,
    budget: parseInt(document.getElementById("budget").value)
  };

  try {
    const response = await fetch("/generate-shopping-list", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const data = await response.json();

    if (!response.ok) {
      resultEl.className = "";
      resultEl.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
      return;
    }

    logEl.innerHTML += `
      <div>[Pi] Context analyzed: family_size=${payload.family_size}</div>
      <div>[Skill] diet-timeline selected purpose=${payload.purpose}</div>
      <div>[MCP] inventory filtering completed</div>
      <div>[MCP] price optimization completed</div>
      <div>[Pi] Final shopping list generated</div>
    `;

    const budget = data.budget || payload.budget;
    const totalCost = data.total_cost || 0;
    const removedItems = data.removed_items || [];

    let html = `
      <div class="summary">
        <div class="summary-card">
          <div class="num">${data.meal_plan.length}</div>
          <div>추천 메뉴</div>
        </div>
        <div class="summary-card">
          <div class="num">${data.shopping_list.length}</div>
          <div>구매 품목</div>
        </div>
        <div class="summary-card">
          <div class="num">₩${totalCost.toLocaleString()}</div>
          <div>예산 ₩${budget.toLocaleString()}</div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">🍽 추천 메뉴</div>
    `;

    data.meal_plan.forEach(meal => {
      html += `<div class="item"><span>${meal}</span></div>`;
    });

    html += `
      </div>

      <div class="card">
        <div class="section-title">🛒 장보기 목록</div>
    `;

    data.shopping_list.forEach(item => {
      html += `
        <div class="item">
          <span>${item.name || item.item}</span>
          <span>₩${item.price.toLocaleString()}</span>
        </div>
      `;
    });

    html += `</div>`;

    if (removedItems.length > 0) {
      html += `
        <div class="card">
          <div class="section-title">⚠️ 예산 초과로 제외된 품목</div>
      `;

      removedItems.forEach(item => {
        html += `
          <div class="item">
            <span>${item.name || item.item}</span>
            <span>₩${item.price.toLocaleString()}</span>
          </div>
        `;
      });

      html += `</div>`;
    }

    if (data.excluded_allergy_items && data.excluded_allergy_items.length > 0) {
      html += `
        <div class="card">
          <div class="section-title">🚫 알레르기 때문에 제외된 재료</div>
          <div class="item">
            <span>${data.excluded_allergy_items.join(", ")}</span>
          </div>
        </div>
      `;
    }

    resultEl.className = "";
    resultEl.innerHTML = html;

  } catch (err) {
    resultEl.className = "";
    resultEl.innerHTML = `<pre>ERROR: ${err.message}</pre>`;
  } finally {
    btn.disabled = false;
    btn.innerText = "🔄 다시 생성";
  }
}
</script>
